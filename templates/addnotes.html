{% extends 'dashboard.html' %}
{% block title %}Add notes {% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{url_for('static',filename='addnotes.css')}}"/>
{% endblock %}
{% block content %}
<h1>Add Notes</h1>
    <form method="POST">
      <label for="title">Title:</label>
      <input type="text" id="title" name="title" required />
      <br /><br />

      <label for="text">Text:</label>
      <textarea id="text" name="text" rows="6" cols="40" required></textarea>
      <br /><br />

      <button type="submit">Submit</button>
    </form>
{% endblock %}
