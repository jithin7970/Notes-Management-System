<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Password - NotesNest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/register.css">

    <style>
        .error-message {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }
        .success-message {
            color: lightgreen;
            font-size: 14px;
            margin-top: 5px;
        }
        .register-back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .register-back-btn:hover {
            background-color: #0056b3;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .register-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .register-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        .register-button {
            width: 100%;
            padding: 12px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .register-button:hover {
            background-color: #764ba2;
        }
    </style>
</head>

<body>

<a href="{{url_for('welcome')}}" class="register-back-btn">Back</a>

<div class="register-container">
    
    <form id="resetForm">
        
        <input type="password" id="password" 
               placeholder="New Password" 
               class="register-input" required>

        <input type="password" id="confirmPassword" 
               placeholder="Confirm Password" 
               class="register-input" required>

        <div id="message" class="error-message"></div>

        <button type="submit" class="register-button">
            Reset Password
        </button>

    </form>
</div>

<script>
document.getElementById("resetForm").addEventListener("submit", function(e) {
    e.preventDefault(); // prevent normal form submit

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const messageDiv = document.getElementById("message");

    // Strong password validation
    const strongPassword = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

    if (!strongPassword.test(password)) {
        messageDiv.innerHTML = "Password must be at least 8 characters and include uppercase, lowercase, number and special character.";
        messageDiv.className = "error-message";
        return;
    }

    if (password !== confirmPassword) {
        messageDiv.innerHTML = "Passwords do not match.";
        messageDiv.className = "error-message";
        return;
    }

    // Send PUT request to backend
    fetch("{{url_for('newpassword',data=data)}}", {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            password: password
        })
    })
    .then(response => response.json())
    .then(data => {
        messageDiv.innerHTML = data.message;
        messageDiv.className = "success-message";
    })
    .catch(error => {
        messageDiv.innerHTML = "Something went wrong.";
        messageDiv.className = "error-message";
    });
});
</script>

</body>
</html>
