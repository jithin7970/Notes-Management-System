<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://i.pinimg.com/736x/d6/20/33/d62033ee49601c7b4b7d886b3d09dfe9.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            color: #ffffff;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            width: 20%;
            height: 20%;
            background-color: rgb(135, 181, 233);
        }

        h1 {
            margin-bottom: 40px;
            font-size: 2.5em;
        }

        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        a {
            padding: 12px 30px;
            font-size: 1.1em;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .login {
            background-color: #0066cc;
            color: #ffffff;
        }

        .login:hover {
            background-color: #0052a3;
        }

        .register {
            background-color: #28a745;
            color: #ffffff;
        }

        .register:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome</h1>
        <div class="links">
            <a href="{{url_for('login')}}" class="login">Login</a>
            <a href="{{url_for('register')}}" class="register">Register</a>
        </div>
    </div>
</body>
</html>
