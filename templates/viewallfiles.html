{% extends 'dashboard.html' %} j{% block title %}view all files {% endblock %}
{% block extra_css %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='viewallfiles.css') }}"
/>
{% endblock %} {% block content %}
<table>
  <thead>
    <tr>
      <th>File ID</th>
      <th>File Name</th>
      <th>Created Date</th>
      <th>View</th>
      <th>Delete</th>
      <th>Update</th>
    </tr>
  </thead>
  <tbody>
    {% for file in filesdata %}
    <tr>
      <td>{{file[0]}}</td>
      <td>{{file[1]}}</td>
      <td>{{file[2]}}</td>
      <td><a href="{{url_for('view_file',fid=file[0])}}">view</a></td>
      <td><a href="{{url_for('download_file',fid=file[0])}}">Downlaod</a></td>
      <td><a href="{{url_for('delete_file',fid=file[0])}}">Delete</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
